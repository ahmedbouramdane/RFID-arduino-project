{% extends 'layout.html' %}
{% block content %}
<div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 card bg-slate-900 border border-slate-800 shadow-2xl p-8 mt-4">
    
    <div>
        <h2 class="text-3xl font-black mb-1">REGISTER USER</h2>
        <p class="text-slate-500 text-xs mb-6 uppercase tracking-widest">Enroll new RFID identity</p>
        
        <form id="addForm" class="space-y-4">
            <input type="hidden" name="image_b64" id="image_b64">
            
            <div class="form-control">
                <label class="label text-[10px] text-slate-400 font-bold uppercase">Hardware ID</label>
                <input type="text" name="uid" value="{{ scanned_uid }}" class="input input-sm input-bordered bg-slate-950 text-primary font-mono" required>
            </div>
            <div class="form-control">
                <label class="label text-[10px] text-slate-400 font-bold uppercase">Full Name</label>
                <input type="text" name="name" class="input input-sm input-bordered bg-slate-950" required>
            </div>
            <div class="form-control">
                <label class="label text-[10px] text-slate-400 font-bold uppercase">Role</label>
                <input type="text" name="role" class="input input-sm input-bordered bg-slate-950" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-sm w-full mt-6">SAVE TO DATABASE</button>
        </form>
    </div>

    <div class="border-l border-slate-800 pl-6 flex flex-col items-center justify-center">
        <label class="label text-[10px] text-slate-400 font-bold uppercase mb-2 w-full text-center">Identity Photo (Optional)</label>
        
        <div class="relative w-40 h-40 bg-slate-950 rounded-2xl overflow-hidden border-2 border-slate-700 mb-4 flex items-center justify-center">
            <video id="video" class="hidden w-full h-full object-cover" autoplay playsinline></video>
            <img id="preview" class="hidden w-full h-full object-cover">
            <svg id="placeholder" class="w-12 h-12 text-slate-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <canvas id="canvas" class="hidden" width="400" height="400"></canvas>
        </div>

        <div class="flex gap-2 w-full">
            <button type="button" id="startCamBtn" class="btn btn-xs btn-outline flex-1">Start Cam</button>
            <button type="button" id="snapBtn" class="btn btn-xs btn-primary flex-1 hidden">Take Photo</button>
            
            <label class="btn btn-xs btn-outline flex-1 cursor-pointer">
                Upload
                <input type="file" id="fileUpload" accept="image/*" class="hidden">
            </label>
        </div>
        <p class="text-[9px] text-slate-500 mt-4 text-center">If left empty, a beautiful default avatar will be generated automatically.</p>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');
    const b64Input = document.getElementById('image_b64');
    let stream;

    // 1. Camera Logic
    document.getElementById('startCamBtn').onclick = async function() {
        this.classList.add('hidden');
        document.getElementById('snapBtn').classList.remove('hidden');
        placeholder.classList.add('hidden');
        preview.classList.add('hidden');
        video.classList.remove('hidden');
        
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
    };

    document.getElementById('snapBtn').onclick = function() {
        const ctx = canvas.getContext('2d');
        // Crop video to square
        const size = Math.min(video.videoWidth, video.videoHeight);
        const startX = (video.videoWidth - size) / 2;
        const startY = (video.videoHeight - size) / 2;
        
        ctx.drawImage(video, startX, startY, size, size, 0, 0, 400, 400);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        
        b64Input.value = dataUrl;
        preview.src = dataUrl;
        
        video.classList.add('hidden');
        preview.classList.remove('hidden');
        this.innerText = 'Retake';
    };

    // 2. File Upload Logic
    document.getElementById('fileUpload').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            b64Input.value = event.target.result;
            preview.src = event.target.result;
            video.classList.add('hidden');
            placeholder.classList.add('hidden');
            preview.classList.remove('hidden');
            
            // Turn off camera if it was on
            if(stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('startCamBtn').classList.remove('hidden');
            document.getElementById('snapBtn').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    };

    // 3. Form Submit
    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/api/add', { method: 'POST', body: new FormData(e.target) });
        if(res.ok) {
            // Stop camera to free memory
            if(stream) stream.getTracks().forEach(track => track.stop());
            
            Swal.fire({ icon: 'success', title: 'User Registered!', background: '#0f172a', color: '#fff', timer: 2000, showConfirmButton: false })
            .then(() => window.location.href = '/scan');
        }
    };
</script>
{% endblock %}
