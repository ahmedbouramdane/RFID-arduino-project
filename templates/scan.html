{% extends 'layout.html' %}
{% block content %}

<!-- Hidden audio elements for scan feedback -->
<audio id="scanSound" src="/static/scan_sound.mp3" preload="auto"></audio>
<audio id="failSound" src="/static/failed.mp3" preload="auto"></audio>

<div class="flex flex-col items-center justify-center min-h-[calc(100vh-200px)] mt-[-20px]">
    
    <!-- RFID Icon (removed, but you can keep if you like) -->

    <div class="relative flex items-center justify-center w-80 h-80 mb-12">
        <div class="absolute inset-0 rounded-full border border-primary/20 animate-[ping_3s_ease-out_infinite]"></div>
        <div class="absolute inset-8 rounded-full border border-primary/40 animate-[ping_2s_ease-out_infinite] [animation-delay:0.5s]"></div>
        <div class="absolute inset-16 rounded-full border border-primary/60 animate-[ping_1.5s_ease-out_infinite] [animation-delay:1s]"></div>
        
        <div class="relative z-10 w-32 h-32 bg-slate-900 rounded-full border-4 border-primary shadow-[0_0_50px_rgba(59,130,246,0.6)] flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-t from-primary/30 to-transparent animate-pulse"></div>
            <svg class="w-14 h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 13a2 2 0 100-4 2 2 0 000 4z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 11h3m-3 4h3"></path>
            </svg>
        </div>
    </div>
    
    <div class="text-center">
        <h1 class="text-4xl mb-3 md:text-5xl font-black tracking-[0.4em] text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 mb-4 drop-shadow-lg p-3">
            Lydex Security System
        </h1>
        <div class="flex items-center justify-center gap-3 mt-[40px]">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></span>
            <p class="text-primary font-mono text-sm tracking-widest uppercase ">
                Awaiting secure credentials...
            </p>
        </div>
    </div>
</div>

<script>
    const socket = io();

    socket.on('connect', () => {
        console.log("✅ Web Interface Connected to Python Server.");
    });

    // Helper to play sound (handles browser autoplay restrictions)
    function playSound(audioId) {
        const audio = document.getElementById(audioId);
        if (audio) {
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
    }

    socket.on('access_granted', (data) => {
        playSound('scanSound');  // Play success sound
        const isEntry = data.type === 'ENTRY';
        
        Swal.fire({
            timer: 4000, 
            timerProgressBar: true, 
            showConfirmButton: true, 
            confirmButtonText: 'ACKNOWLEDGE',
            confirmButtonColor: '#1e293b',
            background: 'transparent',
            backdrop: 'rgba(0,0,0,0.8)',
            html: `
                <div class="bg-slate-900 border ${isEntry ? 'border-emerald-500 shadow-[0_0_40px_rgba(16,185,129,0.3)]' : 'border-amber-500 shadow-[0_0_40px_rgba(245,158,11,0.3)]'} rounded-3xl p-8 max-w-sm mx-auto overflow-hidden relative">
                    <div class="absolute top-0 left-0 w-full py-1 text-center text-[10px] font-black tracking-[0.3em] ${isEntry ? 'bg-emerald-500 text-slate-900' : 'bg-amber-500 text-slate-900'}">
                        ${isEntry ? 'AUTHORIZED ENTRY' : 'AUTHORIZED DEPARTURE'}
                    </div>
                    
                    <img src="${data.user.image}" class="w-36 h-36 object-cover rounded-full mx-auto border-4 border-slate-800 mt-6 mb-4 shadow-xl z-10 relative">
                    
                    <h2 class="text-3xl font-black text-white uppercase tracking-wider">${data.user.name}</h2>
                    <p class="text-slate-400 text-xs font-mono uppercase tracking-widest mt-1">${data.user.role}</p>
                    
                    <div class="mt-8 grid grid-cols-2 gap-4 bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <div class="text-left border-r border-slate-800 pr-2">
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Date</p>
                            <p class="text-sm font-mono text-white">${data.date}</p>
                        </div>
                        <div class="text-right pl-2">
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Time</p>
                            <p class="text-sm font-mono text-white">${data.time}</p>
                        </div>
                        ${!isEntry ? `
                        <div class="col-span-2 mt-2 pt-3 border-t border-slate-800 flex justify-between items-center">
                            <span class="text-[9px] text-primary uppercase font-bold tracking-widest">Total Duration</span>
                            <span class="text-sm font-black font-mono text-amber-400">${data.duration} MIN</span>
                        </div>` : ''}
                    </div>
                </div>
            `
        });
    });

    socket.on('access_denied', (data) => {
        playSound('failSound');  // Play failure sound
        Swal.fire({
            background: 'transparent',
            backdrop: 'rgba(220, 38, 38, 0.2)',
            showConfirmButton: false,
            html: `
                <div class="bg-slate-900 border-2 border-red-500 shadow-[0_0_50px_rgba(220,38,38,0.5)] rounded-3xl p-8 max-w-sm mx-auto relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full py-1 text-center text-[10px] font-black tracking-[0.3em] bg-red-500 text-white">
                        SECURITY ALERT
                    </div>
                    
                    <svg class="w-24 h-24 text-red-500 mx-auto mt-6 mb-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    
                    <h2 class="text-2xl font-black text-white uppercase tracking-wider mb-1">Access Denied</h2>
                    <p class="text-slate-400 text-xs uppercase tracking-widest mb-6">Unrecognized Identity</p>
                    
                    <div class="bg-slate-950 p-4 rounded-xl border border-red-900/50 mb-6">
                        <p class="text-[9px] text-red-400 uppercase font-bold tracking-widest mb-1">Hardware UID Detected</p>
                        <code class="text-xl font-mono text-white">${data.uid}</code>
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <button onclick="navigator.clipboard.writeText('${data.uid}'); this.innerHTML='<span class=\\'text-emerald-400\\'>COPIED TO CLIPBOARD!</span>'" 
                                class="btn btn-outline btn-error btn-sm w-full font-bold tracking-widest">
                            COPY HARDWARE ID
                        </button>
                        <a href="/add_employee?uid=${data.uid}" class="btn btn-error btn-sm w-full font-black tracking-widest text-slate-900">
                            REGISTER IDENTITY
                        </a>
                        <button onclick="Swal.close()" class="btn btn-ghost btn-sm w-full text-slate-500">DISMISS</button>
                    </div>
                </div>
            `
        });
    });
</script>
{% endblock %}
